<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Change Password | ExpenseTracker</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link
		href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap"
		rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
	<style>
		:root {
			--bg: #0d1117;
			--card: #161b22;
			--border: #30363d;
			--accent: #00e5a0;
			--accent-dim: rgba(0, 229, 160, 0.12);
			--text: #e6edf3;
			--muted: #8b949e;
			--danger: #f85149;
			--success: #3fb950;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: var(--bg);
			font-family: 'Nunito', sans-serif;
			color: var(--text);
		}

		.sidebar {
			position: fixed;
			top: 0;
			left: 0;
			width: 240px;
			height: 100vh;
			background: var(--card);
			border-right: 1px solid var(--border);
			display: flex;
			flex-direction: column;
			padding: 1.5rem 1rem;
			z-index: 100;
		}

		.sidebar-brand {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0 0.5rem 1.5rem;
			border-bottom: 1px solid var(--border);
			margin-bottom: 1.5rem;
		}

		.sidebar-brand-icon {
			width: 36px;
			height: 36px;
			background: var(--accent-dim);
			border: 1.5px solid var(--accent);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--accent);
			font-size: 1rem;
		}

		.sidebar-brand span {
			font-family: 'Sora', sans-serif;
			font-weight: 700;
			font-size: 0.95rem;
		}

		.nav-item {
			list-style: none;
			margin-bottom: 4px;
		}

		.nav-link {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0.6rem 0.75rem;
			border-radius: 10px;
			color: var(--muted);
			text-decoration: none;
			font-size: 0.88rem;
			font-weight: 600;
			transition: all 0.2s;
		}

		.nav-link:hover {
			background: var(--accent-dim);
			color: var(--text);
		}

		.nav-link.active {
			background: var(--accent-dim);
			color: var(--accent);
			border: 1px solid rgba(0, 229, 160, 0.2);
		}

		.nav-link i {
			font-size: 1rem;
			width: 18px;
			text-align: center;
		}

		.sidebar-footer {
			margin-top: auto;
			border-top: 1px solid var(--border);
			padding-top: 1rem;
		}

		.user-pill {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0.6rem 0.75rem;
			border-radius: 10px;
			background: var(--bg);
			border: 1px solid var(--border);
		}

		.user-avatar {
			width: 32px;
			height: 32px;
			border-radius: 50%;
			background: var(--accent-dim);
			border: 1.5px solid var(--accent);
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--accent);
			font-size: 0.85rem;
			font-weight: 700;
		}

		.user-info {
			flex: 1;
			overflow: hidden;
		}

		.user-name {
			font-size: 0.8rem;
			font-weight: 700;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.user-role {
			font-size: 0.7rem;
			color: var(--muted);
		}

		.btn-logout {
			background: transparent;
			border: 1px solid var(--border);
			color: var(--muted);
			border-radius: 8px;
			padding: 5px 14px;
			font-size: 0.8rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
		}

		.btn-logout:hover {
			border-color: var(--danger);
			color: var(--danger);
		}

		.main {
			margin-left: 240px;
			padding: 2rem;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.page-title {
			font-family: 'Sora', sans-serif;
			font-size: 1.4rem;
			font-weight: 800;
			margin-bottom: 0.25rem;
		}

		.page-subtitle {
			font-size: 0.85rem;
			color: var(--muted);
			margin-bottom: 2rem;
		}

		.form-card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 2rem;
			max-width: 480px;
		}

		.form-label {
			font-size: 0.8rem;
			font-weight: 600;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin-bottom: 6px;
		}

		.form-control {
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--text);
			border-radius: 10px;
			padding: 0.65rem 1rem;
			font-family: 'Nunito', sans-serif;
			font-size: 0.9rem;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.form-control:focus {
			background: var(--bg);
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.15);
			color: var(--text);
		}

		.form-control::placeholder {
			color: var(--muted);
		}

		.input-group .form-control {
			border-right: none;
			border-radius: 10px 0 0 10px;
		}

		.input-group-text {
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--muted);
			border-radius: 0 10px 10px 0;
			cursor: pointer;
			transition: color 0.2s;
		}

		.input-group-text:hover {
			color: var(--accent);
		}

		.btn-accent {
			background: var(--accent);
			border: none;
			color: #0d1117;
			font-family: 'Sora', sans-serif;
			font-weight: 700;
			font-size: 0.9rem;
			padding: 0.7rem;
			border-radius: 10px;
			width: 100%;
			transition: opacity 0.2s, transform 0.15s;
		}

		.btn-accent:hover {
			opacity: 0.9;
			transform: translateY(-1px);
			color: #0d1117;
		}

		.btn-accent:disabled {
			opacity: 0.6;
		}

		.alert-custom {
			border-radius: 10px;
			font-size: 0.85rem;
			padding: 0.65rem 1rem;
			display: none;
			align-items: center;
			gap: 8px;
			margin-bottom: 1.25rem;
		}

		.alert-custom.show {
			display: flex;
		}

		.alert-error {
			background: rgba(248, 81, 73, 0.1);
			border: 1px solid rgba(248, 81, 73, 0.3);
			color: var(--danger);
		}

		.alert-success {
			background: rgba(63, 185, 80, 0.1);
			border: 1px solid rgba(63, 185, 80, 0.3);
			color: var(--success);
		}

		.spinner-border-sm {
			width: 1rem;
			height: 1rem;
		}

		.security-tip {
			background: rgba(56, 139, 253, 0.08);
			border: 1px solid rgba(56, 139, 253, 0.2);
			border-radius: 10px;
			padding: 0.85rem 1rem;
			font-size: 0.82rem;
			color: #388bfd;
			margin-bottom: 1.5rem;
		}
	</style>
	<script src="theme.js"></script>
</head>

<body>
	<div class="sidebar">
		<a href="/" style="text-decoration:none;color:inherit;"><a href="/dashboard"
				style="text-decoration:none;color:inherit;">
				<div class="sidebar-brand">
					<div class="sidebar-brand-icon"><i class="bi bi-wallet2"></i></div>
					<span>ExpenseTracker</span>
				</div>
			</a></a>
		<ul class="nav flex-column" style="gap:2px;">
			<li class="nav-item"><a href="/dashboard" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a></li>
			<li class="nav-item"><a href="/add-expense" class="nav-link"><i class="bi bi-plus-circle"></i> Add
					Expense</a></li>
			<li class="nav-item"><a href="/view-expense" class="nav-link"><i class="bi bi-list-ul"></i> View
					Expenses</a></li>
			<li class="nav-item"><a href="/reports" class="nav-link"><i class="bi bi-bar-chart"></i> Reports</a>
			</li>
			<li class="nav-item"><a href="/change-password" class="nav-link active"><i class="bi bi-shield-lock"></i>
					Change Password</a></li>
		</ul>
		<div class="sidebar-footer">
			<div style="display:flex;justify-content:flex-end;margin-bottom:0.75rem;" id="themeToggleWrap"></div>
			<div class="user-pill">
				<div class="user-avatar" id="userAvatar">D</div>
				<div class="user-info">
					<div class="user-name" id="userName">Loading...</div>
					<div class="user-role" id="userRole">User</div>
				</div>
				<button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
			</div>
		</div>
	</div>

	<div class="main">
		<div class="page-title">Change Password</div>
		<div class="page-subtitle">Update your account password</div>

		<div class="form-card">
			<div class="security-tip"><i class="bi bi-shield-check me-2"></i>Use a strong password with letters,
				numbers, and symbols.</div>

			<div class="alert-custom alert-error" id="errorAlert"><i class="bi bi-exclamation-circle"></i><span
					id="errorMsg"></span></div>
			<div class="alert-custom alert-success" id="successAlert"><i class="bi bi-check-circle"></i><span>Password
					changed successfully!</span></div>

			<form id="changePasswordForm">
				<div class="mb-3">
					<label class="form-label">Current Password</label>
					<div class="input-group">
						<input type="password" class="form-control" id="oldPassword"
							placeholder="Enter current password" required />
						<span class="input-group-text" onclick="togglePwd('oldPassword','eye1')"><i class="bi bi-eye"
								id="eye1"></i></span>
					</div>
				</div>
				<div class="mb-3">
					<label class="form-label">New Password</label>
					<div class="input-group">
						<input type="password" class="form-control" id="newPassword" placeholder="Enter new password"
							required />
						<span class="input-group-text" onclick="togglePwd('newPassword','eye2')"><i class="bi bi-eye"
								id="eye2"></i></span>
					</div>
				</div>
				<div class="mb-4">
					<label class="form-label">Confirm New Password</label>
					<div class="input-group">
						<input type="password" class="form-control" id="confirmPassword"
							placeholder="Confirm new password" required />
						<span class="input-group-text" onclick="togglePwd('confirmPassword','eye3')"><i
								class="bi bi-eye" id="eye3"></i></span>
					</div>
				</div>
				<button type="submit" class="btn-accent" id="submitBtn">
					<span id="btnText"><i class="bi bi-shield-lock me-1"></i> Change Password</span>
					<span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
				</button>
			</form>
		</div>
	</div>

	<script>
		const BASE_URL = 'http://localhost:8080';
		const session = JSON.parse(sessionStorage.getItem('user'));
		if (!session) window.location.href = '/login';
		const user = session.user;
		const token = session.token;

		document.getElementById('userName').textContent = user.fullName;
		document.getElementById('userRole').textContent = user.role || 'USER';
		document.getElementById('userAvatar').textContent = user.fullName.charAt(0).toUpperCase();

		function togglePwd(fieldId, iconId) {
			const f = document.getElementById(fieldId);
			const i = document.getElementById(iconId);
			f.type = f.type === 'password' ? 'text' : 'password';
			i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
		}

		document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
			e.preventDefault();
			document.getElementById('errorAlert').classList.remove('show');
			document.getElementById('successAlert').classList.remove('show');

			const oldPwd = document.getElementById('oldPassword').value;
			const newPwd = document.getElementById('newPassword').value;
			const confirmPwd = document.getElementById('confirmPassword').value;

			if (newPwd !== confirmPwd) {
				document.getElementById('errorMsg').textContent = 'New password and confirm password do not match';
				document.getElementById('errorAlert').classList.add('show');
				return;
			}
			if (newPwd.length < 6) {
				document.getElementById('errorMsg').textContent = 'Password must be at least 6 characters';
				document.getElementById('errorAlert').classList.add('show');
				return;
			}

			const btn = document.getElementById('submitBtn');
			const btnText = document.getElementById('btnText');
			const spinner = document.getElementById('btnSpinner');
			btn.disabled = true; btnText.innerHTML = 'Updating...'; spinner.classList.remove('d-none');

			try {
				const res = await fetch(`${BASE_URL}/user/changePassword`, {
					method: 'PUT',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({userId: user.id, oldPassword: oldPwd, newPassword: newPwd})
				});
				const data = await res.json();
				if (res.ok && data.statusCode === 200) {
					document.getElementById('successAlert').classList.add('show');
					document.getElementById('changePasswordForm').reset();
					setTimeout(() => {sessionStorage.clear(); window.location.href = '/login';}, 2000);
				} else {
					document.getElementById('errorMsg').textContent = data.message || 'Something went wrong';
					document.getElementById('errorAlert').classList.add('show');
				}
			} catch (e) {
				document.getElementById('errorMsg').textContent = 'Server error. Please try again.';
				document.getElementById('errorAlert').classList.add('show');
			} finally {
				btn.disabled = false;
				btnText.innerHTML = '<i class="bi bi-shield-lock me-1"></i> Change Password';
				spinner.classList.add('d-none');
			}
		});

		function logout() {sessionStorage.clear(); window.location.href = '/login';}
		// ─── Theme toggle init
		document.getElementById("themeToggleWrap").innerHTML = renderThemeToggle();
	</script>
</body>

</html>
