<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login | ExpenseTracker</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link
		href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap"
		rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
	<style>
		:root {
			--bg: #0d1117;
			--card: #161b22;
			--border: #30363d;
			--accent: #00e5a0;
			--accent-dim: rgba(0, 229, 160, 0.12);
			--text: #e6edf3;
			--muted: #8b949e;
			--danger: #f85149;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: var(--bg);
			font-family: 'Nunito', sans-serif;
			color: var(--text);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		/* Animated background */
		body::before {
			content: '';
			position: fixed;
			top: -50%;
			left: -50%;
			width: 200%;
			height: 200%;
			background: radial-gradient(ellipse at 20% 50%, rgba(0, 229, 160, 0.06) 0%, transparent 50%),
				radial-gradient(ellipse at 80% 20%, rgba(0, 120, 212, 0.06) 0%, transparent 50%);
			animation: bgShift 8s ease-in-out infinite alternate;
			z-index: 0;
		}

		@keyframes bgShift {
			0% {
				transform: translate(0, 0);
			}

			100% {
				transform: translate(30px, 20px);
			}
		}

		.auth-wrapper {
			position: relative;
			z-index: 1;
			width: 100%;
			max-width: 420px;
			padding: 1rem;
			animation: fadeUp 0.6s ease forwards;
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(24px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.brand {
			text-align: center;
			margin-bottom: 2rem;
		}

		.brand-icon {
			width: 52px;
			height: 52px;
			background: var(--accent-dim);
			border: 1.5px solid var(--accent);
			border-radius: 14px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 auto 1rem;
			font-size: 1.4rem;
			color: var(--accent);
		}

		.brand h1 {
			font-family: 'Sora', sans-serif;
			font-size: 1.5rem;
			font-weight: 800;
			color: var(--text);
			letter-spacing: -0.5px;
		}

		.brand p {
			font-size: 0.85rem;
			color: var(--muted);
			margin-top: 4px;
		}

		.card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 2rem;
		}

		.form-label {
			font-size: 0.8rem;
			font-weight: 600;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin-bottom: 6px;
		}

		.form-control {
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--text);
			border-radius: 10px;
			padding: 0.65rem 1rem;
			font-family: 'Nunito', sans-serif;
			font-size: 0.9rem;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.form-control:focus {
			background: var(--bg);
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.15);
			color: var(--text);
		}

		.form-control::placeholder {
			color: var(--muted);
		}

		.input-group-text {
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--muted);
			border-radius: 0 10px 10px 0;
			cursor: pointer;
			transition: color 0.2s;
		}

		.input-group-text:hover {
			color: var(--accent);
		}

		.input-group .form-control {
			border-right: none;
			border-radius: 10px 0 0 10px;
		}

		.btn-accent {
			background: var(--accent);
			border: none;
			color: #0d1117;
			font-family: 'Sora', sans-serif;
			font-weight: 700;
			font-size: 0.9rem;
			padding: 0.7rem;
			border-radius: 10px;
			width: 100%;
			transition: opacity 0.2s, transform 0.15s;
			letter-spacing: 0.3px;
		}

		.btn-accent:hover {
			opacity: 0.9;
			transform: translateY(-1px);
			color: #0d1117;
		}

		.btn-accent:disabled {
			opacity: 0.6;
			transform: none;
		}

		.divider {
			display: flex;
			align-items: center;
			gap: 10px;
			margin: 1.25rem 0;
			color: var(--muted);
			font-size: 0.8rem;
		}

		.divider::before,
		.divider::after {
			content: '';
			flex: 1;
			height: 1px;
			background: var(--border);
		}

		.alert-custom {
			background: rgba(248, 81, 73, 0.1);
			border: 1px solid rgba(248, 81, 73, 0.3);
			color: var(--danger);
			border-radius: 10px;
			font-size: 0.85rem;
			padding: 0.65rem 1rem;
			display: none;
		}

		.alert-custom.show {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.footer-text {
			text-align: center;
			margin-top: 1.25rem;
			font-size: 0.85rem;
			color: var(--muted);
		}

		.footer-text a {
			color: var(--accent);
			text-decoration: none;
			font-weight: 600;
		}

		.footer-text a:hover {
			text-decoration: underline;
		}

		.spinner-border-sm {
			width: 1rem;
			height: 1rem;
		}
	</style>
  <script src="theme.js"></script>
</head>

<body>
	<div class="auth-wrapper">
		<div class="brand">
			<div class="brand-icon"><i class="bi bi-wallet2"></i></div>
			<h1>ExpenseTracker</h1>
			<p>Track every rupee, every day</p>
		</div>

		<div class="card">
			<h5 style="font-family:'Sora',sans-serif; font-weight:700; margin-bottom:1.5rem;">Welcome back 👋</h5>

			<div class="alert-custom" id="errorAlert">
				<i class="bi bi-exclamation-circle"></i>
				<span id="errorMsg">Invalid email or password</span>
			</div>

			<form id="loginForm">
				<div class="mb-3">
					<label class="form-label">Email Address</label>
					<input type="email" class="form-control" id="email" placeholder="darshan@gmail.com" required />
				</div>
				<div class="mb-4">
					<label class="form-label">Password</label>
					<div class="input-group">
						<input type="password" class="form-control" id="password" placeholder="••••••••" required />
						<span class="input-group-text" onclick="togglePassword()">
							<i class="bi bi-eye" id="eyeIcon"></i>
						</span>
					</div>
				</div>
				<button type="submit" class="btn-accent" id="loginBtn">
					<span id="btnText">Login</span>
					<span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
				</button>
			</form>

			<div class="divider">or</div>

			<div class="footer-text">
				Don't have an account? <a href="/register">Register here</a>
			</div>
		</div>
	</div>

	<script>
		const BASE_URL = 'http://localhost:8080';

		function togglePassword() {
			const pwd = document.getElementById('password');
			const icon = document.getElementById('eyeIcon');
			if (pwd.type === 'password') {
				pwd.type = 'text';
				icon.className = 'bi bi-eye-slash';
			} else {
				pwd.type = 'password';
				icon.className = 'bi bi-eye';
			}
		}

		function showError(msg) {
			const alert = document.getElementById('errorAlert');
			document.getElementById('errorMsg').textContent = msg;
			alert.classList.add('show');
		}

		function hideError() {
			document.getElementById('errorAlert').classList.remove('show');
		}

		document.getElementById('loginForm').addEventListener('submit', async function (e) {
			e.preventDefault();
			hideError();

			const btn = document.getElementById('loginBtn');
			const btnText = document.getElementById('btnText');
			const spinner = document.getElementById('btnSpinner');

			btn.disabled = true;
			btnText.textContent = 'Logging in...';
			spinner.classList.remove('d-none');

			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;

			try {
				const res = await fetch(`${BASE_URL}/user/login`, {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({email, password})
				});

				const data = await res.json();

				if (res.ok && data.statusCode === 200) {
					// Save user to sessionStorage
					sessionStorage.setItem('user', JSON.stringify(data.data));
					window.location.href = '/dashboard';
				} else {
					showError(data.message || 'Invalid email or password');
				}
			} catch (err) {
				showError('Server error. Please try again.');
			} finally {
				btn.disabled = false;
				btnText.textContent = 'Login';
				spinner.classList.add('d-none');
			}
		});
	</script>
  <!-- Theme toggle (fixed top-right) -->
	<div id="themeToggleWrap" style="position:fixed;top:1rem;right:1rem;z-index:9999;"></div>
	<script>document.getElementById("themeToggleWrap").innerHTML = renderThemeToggle();</script>
</body>

</html>
